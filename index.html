<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title></title>
<style>
  body { font-family: monospace; padding: 20px; background: #fff; color: #000; }
  input { width: 60px; font-family: monospace; font-size: 1em; }
  #question { width: 100%; max-width: 500px; font-family: monospace; font-size: 1em; box-sizing: border-box; margin-bottom: 8px; }
  button { font-family: monospace; font-size: 1em; padding: 4px 12px; cursor: pointer; }
  #result { margin-top: 20px; }
  .grid { display: flex; gap: 32px; flex-wrap: wrap; }
  .person { min-width: 0; }
  .person h3 { margin: 0 0 6px 0; border-bottom: 1px solid #000; padding-bottom: 4px; }
  .person p { margin: 2px 0; cursor: pointer; }
  .person p.active { background: #000; color: #fff; }
  .error { color: red; }
</style>
</head>
<body>
<p><input type="text" id="question" placeholder="질문을 입력하세요"></p>
<p>인원 수: <input type="number" id="people" min="1" value="1">
&nbsp; 카드 수: <input type="number" id="cards" min="1" max="78" value="3">

&nbsp; <button onclick="draw()">go</button></p>
<div id="result"></div>

<script>
const MAJOR = [
  "#0 Fool","#1 Magician","#2 High Priestess","#3 Empress",
  "#4 Emperor","#5 Hierophant","#6 Lovers","#7 Chariot",
  "#8 Strength","#9 Hermit","#10 Wheel of Fortune","#11 Justice",
  "#12 Hanged Man","#13 Death","#14 Temperance","#15 Devil",
  "#16 Tower","#17 Star","#18 Moon","#19 Sun",
  "#20 Judgement","#21 World"
];

const MINOR = (function() {
  const suits = ["Wands","Cups","Swords","Pentacles"];
  const ranks = ["Ace","2","3","4","5","6","7","8","9","10","Page","Knight","Queen","King"];
  const cards = [];
  for (const suit of suits)
    for (const rank of ranks)
      cards.push(`${rank} ${suit}`);
  return cards;
})();

const DECK = [...MAJOR, ...MINOR]; // 78장

function draw() {
  const n = parseInt(document.getElementById("people").value);
  const k = parseInt(document.getElementById("cards").value);
  const out = document.getElementById("result");

  if (!n || n < 1 || !k || k < 1 || k > 78) {
    out.innerHTML = '<p class="error">올바른 숫자를 입력해 주세요. (카드 수는 1~78)</p>';
    return;
  }

  const cols = [];
  for (let i = 0; i < n; i++) {
    const shuffled = [...DECK].sort(() => Math.random() - 0.5);
    const drawn = shuffled.slice(0, k);
    let html = `<div class="person"><h3>[${i + 1}]</h3>`;
    drawn.forEach((card, j) => { html += `<p data-row="${j}" onclick="selectRow(${j})">${j + 1}: ${card}</p>`; });
    html += "</div>";
    cols.push(html);
  }

  out.innerHTML = `<div class="grid">${cols.join("")}</div>`;
}

function selectRow(row) {
  document.querySelectorAll('.person p').forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`.person p[data-row="${row}"]`).forEach(p => p.classList.add('active'));
}
</script>
</body>
</html>
